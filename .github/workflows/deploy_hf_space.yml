name: Deploy to HuggingFace Space

on:
  push:
    branches: [main]
    paths:
      - "app.py"
      - "core/**"
      - "requirements.txt"
      - "download_models.py"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to HuggingFace Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          pip install -q huggingface_hub
          git config --global user.email "ci@github.com"
          git config --global user.name "GitHub Actions"
          
          # Clone the Space repo
          git clone https://mauryasameer:${HF_TOKEN}@huggingface.co/spaces/mauryasameer/OCR hf_deploy
          
          # Clean hf_deploy to get a fresh state from local repo
          # Keep .git directory
          find hf_deploy -maxdepth 1 ! -name ".git" ! -name "hf_deploy" -exec rm -rf {} +
          
          # Copy and merge metadata + README
          cat .github/hf_metadata.yml README.md > hf_deploy/README.md
          cp Dockerfile hf_deploy/
          cp app.py hf_deploy/
          cp requirements.txt hf_deploy/
          cp download_models.py hf_deploy/
          cp -r core hf_deploy/
          cp -r assets hf_deploy/
          cp -r data hf_deploy/
          
          # Commit and push
          cd hf_deploy
          git add -A
          git commit --allow-empty -m "chore: sync from GitHub $(date +'%Y-%m-%d %H:%M')"
          git push
