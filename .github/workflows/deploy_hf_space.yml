name: Deploy to HuggingFace Space

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Hugging Face Hub
        run: pip install huggingface_hub

      - name: Prep Sync Folder
        run: |
          mkdir hf_sync
          # Prepend metadata to README
          cat .github/hf_metadata.yml README.md > hf_sync/README.md
          # Copy all necessary files
          cp Dockerfile hf_sync/
          cp app.py hf_sync/
          cp requirements.txt hf_sync/
          cp download_models.py hf_sync/
          cp -r core hf_sync/
          cp -r assets hf_sync/
          cp -r data hf_sync/
          cp .gitattributes hf_sync/

      - name: Push to Hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python -c "
          from huggingface_hub import HfApi
          import os
          api = HfApi()
          api.upload_folder(
              folder_path='hf_sync',
              repo_id='mauryasameer/OCR',
              repo_type='space',
              token=os.environ['HF_TOKEN']
          )"
