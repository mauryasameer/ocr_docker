[tool.ruff]
target-version = "py311"
line-length = 120
exclude = ["venv", ".venv", "core", "scripts"]

[tool.ruff.lint]
select = [
    "E",    # pycodestyle errors
    "W",    # pycodestyle warnings
    "F",    # pyflakes
    "I",    # isort
    "UP",   # pyupgrade
    "B",    # bugbear
    "PIE",  # miscellaneous improvements
    "PLC",  # pylint convention
]
ignore = [
    "E501",   # long lines — intentional in prompt strings
    "B008",   # function call in default argument
    "UP007",  # keep Optional in public API signatures
    "PIE790", # unnecessary pass in abstract stubs
    "B905",   # zip() strict= requires Python 3.10+; keep 3.9 compat locally
]

[tool.ruff.lint.per-file-ignores]
"scripts/*"  = ["PLC0415", "T201"]
"tests/*"    = ["S101", "PLC0415"]
"conftest.py" = ["PLC0415"]

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
addopts = "-v --tb=short"
